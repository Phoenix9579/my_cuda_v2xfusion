# ============================================================
# Exp07b — 双流架构完整方法：Foreground + Background + GatedFuser
# 
# 目的: 本文提出的方法。门控融合学习逐位置信任度，
#       gate→1 信任LiDAR(fg+bg), gate→0 退化到Exp06(仅前景+cam)
# 
# Fuser: GatedFuser (门控 + 残差退化到Exp06)
# LiDAR: 前景(velodyne_gt) + 背景(velodyne_bg) 双路PointPillars
# ============================================================

